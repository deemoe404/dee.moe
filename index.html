  <style id="press-boot-progress-style">
    #press-boot-progress {
      --press-boot-progress-value: 0.08;
      --press-boot-progress-track: rgba(17, 24, 39, 0.08);
      --press-boot-progress-bar: #2563eb;
      position: fixed;
      inset: 0 0 auto 0;
      z-index: 2147483647;
      height: 3px;
      overflow: hidden;
      pointer-events: none;
      background: var(--press-boot-progress-track);
    }

    [data-theme="dark"] #press-boot-progress {
      --press-boot-progress-track: rgba(255, 255, 255, 0.1);
      --press-boot-progress-bar: #93c5fd;
    }

    #press-boot-progress span {
      position: relative;
      display: block;
      width: 100%;
      height: 100%;
      transform: scaleX(var(--press-boot-progress-value));
      transform-origin: left center;
      overflow: hidden;
      background: var(--press-boot-progress-bar);
      transition: transform 0.28s ease;
    }

    #press-boot-progress span::after {
      content: "";
      position: absolute;
      inset: 0;
      transform: translateX(-100%);
      background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.45), transparent);
      animation: press-boot-progress-sheen 1.1s infinite;
    }

    @keyframes press-boot-progress-sheen {
      100% { transform: translateX(100%); }
    }

    @media (prefers-reduced-motion: reduce) {
      #press-boot-progress span {
        transition: none;
      }

      #press-boot-progress span::after {
        animation: none;
        display: none;
      }
    }
  </style>
